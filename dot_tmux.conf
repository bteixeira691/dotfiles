# =================== tmux.conf ===================
# Cross-platform tmux config.
# Prefix: Ctrl-a (replaces default Ctrl-b)
# Status: Tokyo Night colors to match terminal
# Copy mode: vim-style

# =================== General ===================
# True color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides "*-256color:Tc"
setw -g xterm-keys on

# Refresh env (useful for ssh-agent, etc.)
set-option -g renumber-windows on
set-option -g set-titles on
set-option -g set-titles-string "#T - #W"

# =================== Prefix ===================
# Change prefix to Ctrl-a (like screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# =================== Bindings: split panes ===================
# | and - split horizontally/vertically (like vim)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation: vim-style hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing: HJKL (capital, hold shift)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# =================== Bindings: windows ===================
# Cycle through windows with prefix + n/p (or prefix + Tab)
bind n next-window
bind p previous-window
bind Tab last-window

# New window inherits cwd
bind c new-window -c "#{pane_current_path}"

# =================== Copy mode ===================
# Enter copy mode with prefix + [
# Vim keys in copy mode
setw -g mode-keys vi

# vim-style copy-mode bindings
bind -T copy-mode-vi v     send -X begin-selection
bind -T copy-mode-vi C-v   send -X rectangle-toggle
bind -T copy-mode-vi y     send -X copy-selection-and-cancel
bind -T copy-mode-vi Y     send -X copy-end-of-line
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi h     send -X cursor-left
bind -T copy-mode-vi j     send -X cursor-down
bind -T copy-mode-vi k     send -X cursor-up
bind -T copy-mode-vi l     send -X cursor-right
bind -T copy-mode-vi w     send -X cursor-word
bind -T copy-mode-vi b     send -X cursor-word -1
bind -T copy-mode-vi 0     send -X cursor-home
bind -T copy-mode-vi $     send -X cursor-end
bind -T copy-mode-vi /     send -X search-forward
bind -T copy-mode-vi ?     send -X search-backward
bind -T copy-mode-vi n     send -X search-again
bind -T copy-mode-vi N     send -X search-reverse
bind -T copy-mode-vi H     send -X start-of-line
bind -T copy-mode-vi L     send -X end-of-line

# Copy to system clipboard on selection
# (requires xclip on Linux, pbcopy on macOS, clip.exe on Windows)
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'y' run-shell -b "tmux save-buffer - | xclip -selection clipboard 2>/dev/null || tmux save-buffer - | pbcopy 2>/dev/null || tmux save-buffer - | clip.exe 2>/dev/null"

# Mouse: enable click-to-select panes/windows
set -g mouse on

# =================== Pane appearance ===================
# 1-line status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 80

# =================== Status bar (Tokyo Night) ===================
# Status bar colors
set -g status-style "bg=#1a1b26,fg=#c0caf5"

# Pane border
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"

# Active/inactive pane styles
set -g window-style "fg=#a9b1d6,bg=#1a1b26"
set -g window-active-style "fg=#c0caf5,bg=#1a1b26"

# Status line format
# Left: session name | Right: window list + clock
set -g status-left "#[fg=#7aa2f7,bold] #S #[default] "
set -g status-right "#[fg=#7aa2f7]#{?client_prefix,#[bg=#bb9af7,fg=#1a1b26] PREFIX ,}#[default]#[fg=#c0caf5] %H:%M %d-%b "

# Window list (centered)
setw -g window-status-format "#[fg=#a9b1d6] #I: #W "
setw -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold] #I: #W "

# =================== Plugins (tpm) ===================
# Install tpm with: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then press prefix + I to install plugins.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-pomodoro'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-online-status'

# Sensible defaults
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Initialize tpm (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
