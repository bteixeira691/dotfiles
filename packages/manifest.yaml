# packages/manifest.yaml — Single source of truth for all tools
# Maps each tool to its package name per OS/package manager.
# Reference for humans and install scripts.
#
# Fields:
#   arch, fedora, debian: package name in the respective package manager
#   brew: Homebrew formula/cask name (macOS)
#   winget: Windows package ID
#   note: any special install instructions

tools:
  # ===== Core CLI =====
  fzf:
    arch: fzf
    fedora: fzf
    debian: fzf
    brew: fzf
    winget: junegunn.fzf

  ripgrep:
    arch: ripgrep
    fedora: ripgrep
    debian: ripgrep
    brew: ripgrep
    winget: BurntSushi.ripgrep

