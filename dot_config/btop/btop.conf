# =================== btop theme: Tokyo Night ===================

# Tokyo Night palette
theme[main_bg] = "#1a1b26"
theme[main_fg] = "#c0caf5"
theme[title] = "#7aa2f7"
theme[hi_fg] = "#bb9af7"
theme[selected_bg] = "#33467c"
theme[selected_fg] = "#c0caf5"
theme[inactive_fg] = "#414868"
theme[proc_start] = "#9ece6a"
theme[proc_mid] = "#e0af68"
theme[proc_end] = "#f7768e"
theme[cpu_start] = "#7aa2f7"
theme[cpu_mid] = "#bb9af7"
theme[cpu_end] = "#7dcfff"
theme[div_line] = "#414868"
theme[mem_start] = "#9ece6a"
theme[mem_mid] = "#e0af68"
theme[mem_end] = "#f7768e"
theme[net_start] = "#7aa2f7"
theme[net_mid] = "#bb9af7"
theme[net_end] = "#7dcfff"
theme[bar_bg] = "#1f2335"

# UI options
color_theme = "tokyo_night"
theme_background = false
theme_foreground = true
truecolor = true
presets = "cpu:1:default cpu:0:default,mem:0:default,net:0:default"

# General
update_ms = 1000
background_update = true
shown_boxes = ["cpu", "mem", "net", "proc"]
show_cpu_freq = true
show_cpu_temp = true
show_uptime = true
show_battery = true
show_swap = true
base_10_sizes = false

# Layout
tree_view = false
show_program_tree = true
show_detailed_per_cpu = true
proc_sort = "cpu%"
proc_reversed = false
proc_per_core = false
proc_mem_bytes = true
proc_log = false
proc_colors = true
proc_gradient = true
proc_start_bytes = false
proc_cpu_base = "auto"

# Network
net_iface = "all"
net_sync = false
net_auto = true
net_color = true

# Disk
disks_filter = ""
disks_order = "read"
show_disks = false
