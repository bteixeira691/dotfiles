# =================== Starship ===================
# Minimal prompt: directory + git + time

palette = "tokyo_night"

format = """\
$directory\
$git_branch\
$git_status\
$time\
$character\
"""

add_newline = true

[palettes.tokyo_night]
color_fg = "#c0caf5"
color_bg = "#1a1b26"
color_red = "#f7768e"
color_green = "#9ece6a"
color_yellow = "#e0af68"
color_blue = "#7aa2f7"
color_magenta = "#bb9af7"
color_cyan = "#7dcfff"
color_white = "#c0caf5"
color_gray = "#414868"

# Disable OS, user, hostname
[os]
disabled = true

[username]
disabled = true

[hostname]
disabled = true

# Directory
[directory]
truncation_length = 3
truncation_symbol = "…/"
style = "bold cyan"

# Git
[git_branch]
style = "bold magenta"
format = "[$branch]($style)"

[git_status]
style = "bold red"
format = " [$all_status$ahead_behind]($style)"

# Time
[time]
disabled = false
time_format = "%R"
style = "dimmed cyan"
format = " [$time]($style)"

# Prompt character
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# Disable all language modules
[nodejs]
disabled = true

[rust]
disabled = true

[python]
disabled = true

[dotnet]
disabled = true

[java]
disabled = true

[golang]
disabled = true

# Disable extras
[cmd_duration]
disabled = true

[status]
disabled = true
